name: Deploy Web (Vercel)

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-web.yml"
      - "apps/web/vercel.json"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "production"
        type: choice
        options: [production, preview]

concurrency:
  group: deploy-web-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9.1.0
      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel env (${{ github.event.inputs.environment || 'production' }})
        working-directory: apps/web
        run: |
          ENV="${{ github.event.inputs.environment || 'production' }}"
          vercel pull --yes --environment="$ENV" --token="$VERCEL_TOKEN"

      - name: Build
        working-directory: apps/web
        run: |
          ENV="${{ github.event.inputs.environment || 'production' }}"
          if [ "$ENV" = "production" ]; then
            vercel build --prod --token="$VERCEL_TOKEN"
          else
            vercel build --token="$VERCEL_TOKEN"
          fi

      - name: Deploy prebuilt artifact
        working-directory: apps/web
        run: |
          ENV="${{ github.event.inputs.environment || 'production' }}"
          if [ "$ENV" = "production" ]; then
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          else
            vercel deploy --prebuilt --token="$VERCEL_TOKEN"
          fi
