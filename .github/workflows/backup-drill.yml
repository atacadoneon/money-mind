name: Monthly Restore Drill

on:
  schedule:
    # Primeiro dia de cada mês, 4am UTC
    - cron: '0 4 1 * *'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: false
        default: staging
        type: choice
        options: [staging]

concurrency:
  group: backup-drill
  cancel-in-progress: false

jobs:
  restore-drill:
    name: Restore drill — staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -q
          sudo apt-get install -y postgresql-client awscli

      - name: Run restore drill
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
        run: |
          chmod +x scripts/backup/restore-drill.sh
          bash scripts/backup/restore-drill.sh
        continue-on-error: false

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Restore Drill PASSOU* — ${{ github.event.repository.name }}\nData: ${{ github.run_started_at }}\nVer resultado: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *Restore Drill FALHOU* — ${{ github.event.repository.name }}\nAção necessária: verificar backup!\nVer logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Upload drill log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-drill-${{ github.run_id }}
          path: /tmp/restore_drill_*.log
          retention-days: 30
        continue-on-error: true
